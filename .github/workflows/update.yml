name: Update and deploy project directory

on:
  schedule:
    - cron: "23 */6 * * *"
  push:
    branches: [main]
    paths:
      - "automation.config.json"
      - "lib/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - ".github/workflows/update.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore automation state and screenshots
        uses: actions/cache/restore@v4
        with:
          path: |
            covers
            enrichment_cache.json
            health_data.json
            screenshot_state.json
          key: projects-automation-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            projects-automation-${{ runner.os }}-

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Fetch public repositories
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "users/weepwood/repos?per_page=100&sort=updated&type=owner" > repos_raw.json

      - name: Enrich and classify projects
        run: npm run enrich

      - name: Plan screenshots
        id: screenshot-plan
        run: npm run screenshots:plan

      - name: Install Chromium only when screenshots are due
        if: steps.screenshot-plan.outputs.count != '0'
        run: npx playwright install --with-deps chromium

      - name: Capture due screenshots
        if: steps.screenshot-plan.outputs.count != '0'
        run: npm run screenshots:capture

      - name: Check project health
        run: npm run health

      - name: Synchronize offline issues
        run: npm run issues:sync

      - name: Build static site
        run: npm run generate

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp index.html projects_data.json automation_report.json dist/
          if [ -d covers ]; then cp -R covers dist/covers; fi
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Save automation state and screenshots
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            covers
            enrichment_cache.json
            health_data.json
            screenshot_state.json
          key: projects-automation-${{ runner.os }}-${{ github.run_id }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
